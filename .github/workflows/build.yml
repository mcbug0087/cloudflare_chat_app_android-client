name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Create APK output directory
        run: mkdir -p outputs/apk

      - name: Copy Debug APKs
        run: |
          find app/build/outputs/apk -name "*.apk" -exec cp {} outputs/apk/ \;

      - name: List output files
        run: ls -la outputs/apk/

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CloudflareChat-APKs
          path: outputs/apk/
          retention-days: 30

      - name: Upload Release APK as single artifact
        uses: actions/upload-artifact@v4
        with:
          name: CloudflareChat-Release-APK
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30